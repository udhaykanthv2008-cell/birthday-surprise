<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="welcome">

    <h1>A Special Surprise ❤️</h1>

    <p>Touch anywhere to continue...</p>

</div>
<div id="progressContainer">
    <div id="progressBar"></div>
</div>
<div class="container">

    <div class="heart"></div>

    <h2>Touch My Heart ❤️</h2>

    <div id="countdown"></div>

    <h1 id="birthdayTitle" style="display:none;">
        🎉 Happy Birthday My Everything ❤️
    </h1>

    <div id="message" style="display:none;">

        <div class="gallery">

            <img src="photo1.jpg" class="photo">

            <img src="photo2.jpg" class="photo">

            <img src="photo3.jpg" class="photo">

        </div>

        <p id="letter"></p>

    </div>

</div>
<div id="endingScreen">

    <h1>Happy Birthday My Everything ❤️</h1>

    <p>
        Thank you for being<br>
        the best part of my life. 💖
    </p>

    <h2>Forever Yours,</h2>

    <h1>From Your Udhay ❤️</h1>
<button id="replayBtn">❤️ Replay Surprise ❤️</button>
</div>
<audio id="bgMusic">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
